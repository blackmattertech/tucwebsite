<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Critical CSS: allow first paint before main stylesheet (reduces render-blocking impact) -->
    <style>
      body{margin:0;background:#0a0a0a;font-family:system-ui,sans-serif}
      #root{min-height:100vh;display:block}
      #hero{min-height:clamp(400px,85dvh,900px);position:relative}
    </style>
    <title>TAG UNLIMITED - Private Label Apparel Manufacturer Bangalore</title>
    <meta name="description" content="TAG UNLIMITED is a trusted private label apparel manufacturer in Bangalore. We manufacture premium t-shirts, hoodies, shirts, corporate uniforms, and custom garments. 180+ five-star reviews." />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tucwebsite.vercel.app/" />
    <!-- LCP: preload hero poster so above-the-fold image loads immediately -->
    <link rel="preload" as="image" href="/hero-poster.webp" fetchpriority="high" />
    <!-- DNS prefetch + preconnect for Supabase (media_assets) and ImageKit (media URLs) -->
    <link rel="dns-prefetch" href="https://vwpseddaghxktpjtriaj.supabase.co" />
    <link rel="preconnect" href="https://vwpseddaghxktpjtriaj.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://ik.imagekit.io" />
    <link rel="preconnect" href="https://ik.imagekit.io" crossorigin />
    <!-- Preconnect for Unsplash (OptimizedImage remote) -->
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <!-- Typography: Montserrat, Inter, Khand – self-hosted in /assets/fonts (see src/styles/fonts.css) -->
    <link rel="preload" href="/assets/fonts/inter-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/assets/fonts/montserrat-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tucwebsite.vercel.app/" />
    <meta property="og:title" content="TAG UNLIMITED - Private Label Apparel Manufacturer Bangalore" />
    <meta property="og:description" content="Trusted private label apparel manufacturer in Bangalore. Premium t-shirts, hoodies, shirts, corporate uniforms. 180+ five-star reviews." />
    <meta property="og:image" content="https://tucwebsite.vercel.app/logo.svg" />
    <meta property="og:locale" content="en_IN" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TAG UNLIMITED - Private Label Apparel Manufacturer Bangalore" />
    <meta name="twitter:description" content="Trusted private label apparel manufacturer in Bangalore. Premium garments &amp; bulk manufacturing." />
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
